name: 'Build iOS App'
description: 'Build the iOS app'
runs:
  using: 'composite'
  steps:
    - name: Build iOS App
      run: |
        xcodebuild -project ios/WeatherApp.xcodeproj \
                   -scheme WeatherApp \
                   -configuration Debug \
                   -sdk iphonesimulator \
                   -derivedDataPath build
